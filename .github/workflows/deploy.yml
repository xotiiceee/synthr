name: Deploy to IONOS VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            .next/standalone \
            node_modules \
            prisma \
            package.json \
            package-lock.json \
            ecosystem.config.js \
            deploy/

      - name: Setup SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write key and fix Windows line endings (CRLF -> LF)
          printf '%s\n' "$VPS_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Verify key looks valid (show header/footer without exposing content)
          head -1 ~/.ssh/deploy_key
          tail -1 ~/.ssh/deploy_key

          # Add host key
          ssh-keyscan -t ed25519 -H "$VPS_IP" > ~/.ssh/known_hosts 2>/dev/null

          # Start ssh-agent and add key
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

          # Test connection
          ssh -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes "$VPS_USER@$VPS_IP" "echo 'SSH OK'"

      - name: Deploy to VPS
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_IP: ${{ secrets.VPS_IP }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          # Re-setup SSH for this step
          mkdir -p ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" | sed 's/\r$//' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519 -H "$VPS_IP" > ~/.ssh/known_hosts 2>/dev/null
          eval "$(ssh-agent -s)"
          ssh-add ~/.ssh/deploy_key

          # Upload
          scp -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes deploy.tar.gz "$VPS_USER@$VPS_IP:/tmp/"

          # Deploy
          ssh -o StrictHostKeyChecking=accept-new -o IdentitiesOnly=yes "$VPS_USER@$VPS_IP" '
            set -e
            cd /var/www/synthr

            echo "==> Stopping app..."
            pm2 stop synthr 2>/dev/null || true

            echo "==> Backing up old build..."
            rm -rf .next/standalone-prev
            mv .next/standalone .next/standalone-prev 2>/dev/null || true

            echo "==> Extracting new build..."
            tar -xzf /tmp/deploy.tar.gz

            echo "==> Running database migrations..."
            which prisma > /dev/null || npm install -g prisma
            prisma migrate deploy

            echo "==> Restarting app..."
            pm2 start ecosystem.config.js 2>/dev/null || pm2 reload synthr

            echo "==> Cleaning up..."
            rm /tmp/deploy.tar.gz

            echo "==> Deploy complete!"
          '

      - name: Health check
        run: |
          sleep 5
          echo "Checking app health..."
          curl -sf http://${{ secrets.VPS_IP }}:3000 > /dev/null && echo "App is responding!" || echo "Health check inconclusive"
