name: Deploy to IONOS VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js app
        run: npm run build

      - name: Prepare standalone output
        run: |
          cp -r .next/static .next/standalone/.next/
          cp -r public .next/standalone/
          mkdir -p .next/standalone/.next/server
          cp .next/server/middleware-manifest.json .next/standalone/.next/server/ 2>/dev/null || true

      - name: Create deployment archive
        run: |
          tar -czf deploy.tar.gz \
            .next/standalone \
            prisma \
            prisma.config.ts \
            package.json \
            package-lock.json \
            ecosystem.config.js \
            deploy/

      - name: Deploy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy.tar.gz"
          target: "/tmp"
          strip_components: 0

      - name: Run deploy commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/synthr

            echo "==> Stopping app..."
            pm2 stop synthr 2>/dev/null || true

            echo "==> Removing old broken files..."
            rm -f /opt/synthr/prisma.config.ts
            rm -rf .next/standalone-prev
            mv .next/standalone .next/standalone-prev 2>/dev/null || true

            echo "==> Extracting new build..."
            tar -xzf /tmp/deploy.tar.gz

            echo "==> Running database migrations..."
            export DATABASE_URL="$(cat /opt/synthr/.env | grep DATABASE_URL | cut -d'"' -f2)" && npx prisma migrate deploy --schema=./prisma/schema.prisma

            echo "==> Restarting app..."
            pm2 start ecosystem.config.js 2>/dev/null || pm2 reload synthr --update-env

            echo "==> Cleaning up..."
            rm -rf /opt/synthr/node_modules 2>/dev/null || true
            rm /tmp/deploy.tar.gz

            echo "==> Deploy complete!"

      - name: Health check
        run: |
          sleep 5
          echo "Checking app health..."
          curl -sf http://${{ secrets.VPS_IP }}:3000 > /dev/null && echo "App is responding!" || echo "Health check inconclusive"
