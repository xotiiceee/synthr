<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Background circle -->
  <rect width="120" height="120" rx="28" fill="#0f172a"/>
  
  <!-- Outer glow ring -->
  <rect width="120" height="120" rx="28" stroke="#00d4aa" stroke-width="1.5" stroke-opacity="0.15"/>
  
  <!-- Abstract S + growth chart mark -->
  <!-- Top bar (horizontal) -->
  <path d="M30 38 L75 38" stroke="#00d4aa" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Curve top-right to middle-left -->
  <path d="M75 38 C95 38 95 60 75 60 L45 60" stroke="#00d4aa" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Curve middle-left to bottom-right -->
  <path d="M45 60 C25 60 25 82 45 82 L90 82" stroke="#00d4aa" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Upward arrow tip at end -->
  <path d="M90 82 L82 76 M90 82 L82 88" stroke="#00d4aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent dots -->
  <circle cx="35" cy="38" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="85" cy="82" r="3" fill="#00d4aa" opacity="0.6"/>
  
  <!-- Year labels (subtle) -->
  <text x="30" y="105" font-family="system-ui" font-size="8" fill="#475569" text-anchor="middle">JAN</text>
  <text x="90" y="105" font-family="system-ui" font-size="8" fill="#475569" text-anchor="middle">DEC</text>
</svg>
