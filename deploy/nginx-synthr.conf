# Nginx reverse proxy configuration for synthr
# Place this at: /etc/nginx/sites-available/synthr
# Then symlink: sudo ln -s /etc/nginx/sites-available/synthr /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name synthr.online www.synthr.online;

    # Redirect all HTTP to HTTPS (Certbot will handle this after SSL setup)
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name synthr.online www.synthr.online;

    # SSL certificates (managed by Certbot)
    # ssl_certificate /etc/letsencrypt/live/synthr.online/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/synthr.online/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # Client body size limit (for file uploads if you add them later)
    client_max_body_size 10M;

    # Proxy to Next.js app running on localhost:3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static files caching
    location /_next/static {
        proxy_pass http://localhost:3000/_next/static;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, immutable";
        expires 1y;
    }

    # Health check endpoint (optional)
    location /api/health {
        proxy_pass http://localhost:3000/api/health;
        access_log off;
    }
}
